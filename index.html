<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .mario-img {
            width: 150px;
            margin-bottom: 20px;
        }

        .btn-oui {
            padding: 15px 50px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            background: #4CAF50;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-oui:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-non {
            padding: 15px 50px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            background: #f44336;
            color: white;
            position: absolute;
            transition: none;
        }

        .message-oui {
            display: none;
            font-size: 1.3rem;
            color: #4CAF50;
            margin-top: 20px;
            font-weight: bold;
        }

        .cat-meme {
            margin-top: 20px;
            max-width: 250px;
            border-radius: 12px;
        }

        .bulle {
            position: absolute;
            background: #333;
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: none;
            animation: disparaitre 1.5s forwards;
            white-space: nowrap;
        }

        @keyframes disparaitre {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://pngimg.com/uploads/mario/mario_PNG12.png" alt="Mario" class="mario-img">
        <h1>Mario, on fait un truc samedi soir ou dimanche après-midi ?</h1>
        <div class="buttons">
            <button class="btn-oui" onclick="direOui()">Oui</button>
            <button class="btn-non" id="btnNon">Non</button>
        </div>
        <div class="message-oui" id="messageOui">
            <p>Super ! J'ai trop hâte ! 🎉</p>
            <img src="https://i.imgflip.com/2/9amg6.jpg" alt="Happy cat" class="cat-meme">
        </div>
    </div>

    <script>
        const btnNon = document.getElementById('btnNon');
        const phrases = [
            "Hey non !", "Arrête !", "Stop !", "Je vais me fâcher !",
            "Même pas en rêve !", "Nope !", "Pas touche !", "Tu rigoles ?",
            "Essaie encore !", "Raté !"
        ];
        let phraseIndex = 0;

        function getRandomPosition() {
            const margin = 80;
            const x = margin + Math.random() * (window.innerWidth - margin * 2);
            const y = margin + Math.random() * (window.innerHeight - margin * 2);
            return { x, y };
        }

        function afficherBulle() {
            const bulle = document.createElement('div');
            bulle.className = 'bulle';
            bulle.textContent = phrases[phraseIndex % phrases.length];
            phraseIndex++;

            const rect = btnNon.getBoundingClientRect();
            bulle.style.left = rect.left + 'px';
            bulle.style.top = (rect.top - 10) + 'px';
            document.body.appendChild(bulle);

            setTimeout(() => bulle.remove(), 1500);
        }

        btnNon.addEventListener('mouseover', fuir);
        btnNon.addEventListener('touchstart', fuir);
        btnNon.addEventListener('focus', fuir);

        function fuir(e) {
            e.preventDefault();
            afficherBulle();
            const pos = getRandomPosition();
            btnNon.style.left = pos.x + 'px';
            btnNon.style.top = pos.y + 'px';
        }

        function direOui() {
            document.querySelector('.buttons').style.display = 'none';
            document.getElementById('messageOui').style.display = 'block';
            document.querySelector('.emoji').textContent = '🥳';
        }
    </script>
</body>
</html>
